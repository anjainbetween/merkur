<f:comment><!-- Hero Section – fields sourced from page properties (TCA) with XLF fallbacks --></f:comment>

<section class="section section--hero" id="hero" aria-labelledby="hero-headline">

    <div class="hero__planet" aria-hidden="true">
        <div class="hero__planet-sphere">
            <div class="hero__planet-blob hero__planet-blob--1"></div>
            <div class="hero__planet-blob hero__planet-blob--2"></div>
            <div class="hero__planet-blob hero__planet-blob--3"></div>
            <div class="hero__planet-blob hero__planet-blob--4"></div>
            <div class="hero__planet-blob hero__planet-blob--5"></div>
        </div>
        <div class="hero__planet-stars" id="planet-stars"></div>
    </div>

    <div class="container">
        <div class="hero__content">
            <h1 class="hero__headline animate-fade-up" id="hero-headline">
                <f:if condition="{data.tx_merkursitepackage_hero_headline}">
                    <f:then>{data.tx_merkursitepackage_hero_headline}</f:then>
                    <f:else>
                        <f:translate key="LLL:EXT:merkur_sitepackage/Resources/Private/Language/locallang.xlf:hero.headline" />
                    </f:else>
                </f:if>
            </h1>

            <p class="hero__subline animate-fade-up" style="animation-delay: 0.1s">
                <f:if condition="{data.tx_merkursitepackage_hero_subheadline}">
                    <f:then>{data.tx_merkursitepackage_hero_subheadline}</f:then>
                    <f:else>
                        <f:translate key="LLL:EXT:merkur_sitepackage/Resources/Private/Language/locallang.xlf:hero.subline" />
                    </f:else>
                </f:if>
            </p>

            <div class="hero__actions animate-fade-up" style="animation-delay: 0.2s">
                <f:if condition="{data.tx_merkursitepackage_hero_button_link}">
                    <f:then>
                        <f:link.typolink
                            parameter="{data.tx_merkursitepackage_hero_button_link}"
                            class="btn btn--primary btn--lg"
                        >
                            <f:if condition="{data.tx_merkursitepackage_hero_button_text}">
                                <f:then>{data.tx_merkursitepackage_hero_button_text}</f:then>
                                <f:else>
                                    <f:translate key="LLL:EXT:merkur_sitepackage/Resources/Private/Language/locallang.xlf:hero.cta.primary" />
                                </f:else>
                            </f:if>
                        </f:link.typolink>
                    </f:then>
                    <f:else>
                        <a class="btn btn--primary btn--lg" href="#contact">
                            <f:if condition="{data.tx_merkursitepackage_hero_button_text}">
                                <f:then>{data.tx_merkursitepackage_hero_button_text}</f:then>
                                <f:else>
                                    <f:translate key="LLL:EXT:merkur_sitepackage/Resources/Private/Language/locallang.xlf:hero.cta.primary" />
                                </f:else>
                            </f:if>
                        </a>
                    </f:else>
                </f:if>
            </div>
        </div>
    </div>
</section>
