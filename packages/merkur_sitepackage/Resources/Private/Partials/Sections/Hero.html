<f:comment><!-- Hero Section --></f:comment>

<section class="section section--hero" id="hero" aria-labelledby="hero-headline">
    <div class="hero__background" aria-hidden="true">
        <div class="hero__gradient"></div>
        <div class="hero__particles"></div>
    </div>

    <div class="container">
        <div class="hero__content">
            <span class="hero__tagline animate-fade-up">
                <f:translate key="LLL:EXT:merkur_sitepackage/Resources/Private/Language/locallang.xlf:hero.tagline" />
            </span>

            <h1 class="hero__headline animate-fade-up" id="hero-headline" style="animation-delay: 0.1s">
                <f:translate key="LLL:EXT:merkur_sitepackage/Resources/Private/Language/locallang.xlf:hero.headline" />
            </h1>

            <p class="hero__subline animate-fade-up" style="animation-delay: 0.2s">
                <f:translate key="LLL:EXT:merkur_sitepackage/Resources/Private/Language/locallang.xlf:hero.subline" />
            </p>

            <div class="hero__actions animate-fade-up" style="animation-delay: 0.3s">
                <a class="btn btn--primary btn--lg" href="#services">
                    <f:translate key="LLL:EXT:merkur_sitepackage/Resources/Private/Language/locallang.xlf:hero.cta.primary" />
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </a>
                <a class="btn btn--outline btn--lg" href="#contact">
                    <f:translate key="LLL:EXT:merkur_sitepackage/Resources/Private/Language/locallang.xlf:hero.cta.secondary" />
                </a>
            </div>
        </div>
    </div>

    <a class="hero__scroll-indicator" href="#about" aria-label="Nach unten scrollen">
        <span class="hero__scroll-dot"></span>
    </a>
</section>
