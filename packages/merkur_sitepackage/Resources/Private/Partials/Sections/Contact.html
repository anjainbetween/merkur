<f:comment><!-- Kontakt Section – TCA fields: contact_headline, contact_subline, contact_email, hero_button_text --></f:comment>

<section class="section section--contact" id="contact" aria-labelledby="contact-headline">
    <div class="container">
        <div class="contact__cta" data-animate="fade-up">

            <h2 class="contact__headline" id="contact-headline">
                <f:if condition="{data.tx_merkursitepackage_contact_headline}">
                    <f:then>{data.tx_merkursitepackage_contact_headline}</f:then>
                    <f:else>
                        <f:translate key="LLL:EXT:merkur_sitepackage/Resources/Private/Language/locallang.xlf:contact.headline" />
                    </f:else>
                </f:if>
            </h2>

            <p class="contact__subline">
                <f:if condition="{data.tx_merkursitepackage_contact_subline}">
                    <f:then>{data.tx_merkursitepackage_contact_subline}</f:then>
                    <f:else>
                        <f:translate key="LLL:EXT:merkur_sitepackage/Resources/Private/Language/locallang.xlf:contact.subline" />
                    </f:else>
                </f:if>
            </p>

            <f:variable name="contactEmail">
                <f:if condition="{data.tx_merkursitepackage_contact_email}">
                    <f:then>{data.tx_merkursitepackage_contact_email}</f:then>
                    <f:else>hallo@mitmerkur.ch</f:else>
                </f:if>
            </f:variable>

            <a class="btn btn--primary" href="mailto:{contactEmail}">
                <f:if condition="{data.tx_merkursitepackage_hero_button_text}">
                    <f:then>{data.tx_merkursitepackage_hero_button_text}</f:then>
                    <f:else>
                        <f:translate key="LLL:EXT:merkur_sitepackage/Resources/Private/Language/locallang.xlf:hero.cta.primary" />
                    </f:else>
                </f:if>
            </a>

        </div>
    </div>
</section>
